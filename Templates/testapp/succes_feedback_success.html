{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Submitted Successfully</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #fff0e5, #ffe6cc);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            background-color: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px solid #ffd699;
            max-width: 500px;
        }

        .success-icon {
            font-size: 60px;
            color: #4BB543;
            margin-bottom: 15px;
        }

        h2 {
            color: #ff6f61;
            font-family: 'Comic Sans MS', cursive;
            margin-bottom: 15px;
        }

        p {
            color: #a35d4d;
            font-size: 1rem;
        }

        a.btn-home {
            margin-top: 25px;
            background-color: #ff704d;
            border-color: #ff704d;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 25px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            display: inline-block;
            transition: all 0.3s ease;
        }

        a.btn-home:hover {
            background-color: #ff9966;
            border-color: #ff9966;
        }

        .emoji {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="success-icon">✅</div>
    <h2>Feedback Submitted!</h2>
    <p>Thank you for taking the time to share your feedback. 🍽<br>
       Your response has been recorded successfully for this mess.</p>

    <a href="/" class="btn-home">🏠 Go Back to Home</a>
</div>

</body>
</html>
