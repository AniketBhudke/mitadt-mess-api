{% load static %}
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>All Notices</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #fffdf9; font-family: Poppins, sans-serif; padding: 30px 0; }
    .notice-card { border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 16px; background: white; }
    .notice-title { font-weight: 700; color:#ffd24d; } /* bright to match theme */
    .notice-meta { color:#888; font-size:14px; }
    .back-btn { border-radius: 10px; }
    .attachment-link { margin-top:8px; display:inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>📢 All Notices</h2>
      <a href="{% url 'index' %}" class="btn btn-outline-secondary back-btn">Back to Home</a>
    </div>

    {% if notices %}
      {% for n in notices %}
        <div class="notice-card">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="notice-title">{{ n.title }}</div>
              <div class="small text-muted">{{ n.created_at|date:"d M Y, H:i" }}</div>
            </div>
          </div>

          <p class="mt-3">{{ n.body|linebreaks }}</p>

          {% if n.attachment %}
            <a href="{{ n.attachment.url }}" class="btn btn-sm btn-primary attachment-link" download>Download Attachment</a>
          {% endif %}
        </div>
      {% endfor %}
    {% else %}
      <div class="alert alert-info">No notices found.</div>
    {% endif %}
  </div>
</body>
</html>
