<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <style>
        body {
            background: #e9f0ff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .thank-you-container {
            background: #fff;
            padding: 40px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 500px;
        }

        h1 {
            color: #1c1c1c;
            font-size: 28px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            color: #555;
            margin-bottom: 25px;
        }

        .btn-back {
            display: inline-block;
            padding: 12px 25px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #004bcc;
        }
    </style>
</head>
<body>

<div class="thank-you-container">
    <h1>✅ Thank You!</h1>
    <p>Your feedback has been submitted successfully.</p>

    <!-- Back Button -->
    <a href="{% url 'index' %}" class="btn-back">⬅ Back to Home</a>
</div>

</body>
</html>
