{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Submitted Successfully</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #ffe3c8, #ffd4ab);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Success Card */
.success-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
    text-align: center;
    padding: 40px 50px;
    max-width: 550px;
    border-top: 6px solid #ff6f3d;
    animation: fadeIn 0.7s ease-in-out;
}

/* Checkmark */
.success-card .checkmark {
    font-size: 70px;
    color: #28a745;
    margin-bottom: 15px;
    animation: pop 0.4s ease-out;
}

/* Title */
.success-card h2 {
    color: #ff5c2b;
    font-weight: 800;
    font-size: 30px;
    margin-bottom: 10px;
}

/* Message */
.success-card p {
    color: #5e3600;
    font-size: 16px;
    margin-bottom: 30px;
}

/* Buttons */
.success-card .btn-home {
    background: linear-gradient(to right, #ff5c2b, #ff8b5c);
    color: #fff;
    border: none;
    font-weight: 600;
    font-size: 16px;
    padding: 12px 26px;
    border-radius: 10px;
    transition: 0.3s ease;
    text-decoration: none;
    display: inline-block;
}
.success-card .btn-home:hover {
    background: linear-gradient(to right, #ff794c, #ff9f70);
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(255,108,46,0.3);
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>

<div class="success-card">
    <div class="checkmark">✅</div>
    <h2>Feedback Submitted!</h2>
    <p>Thank you for sharing your weekly suggestions.<br>
    Your feedback helps us improve your mess experience!</p>

    <a href="{% url 'index' %}" class="btn-home">🏠 Back to Home</a>
</div>

</body>
</html>
{% endblock %}
