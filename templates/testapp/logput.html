<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>Logout</title>
    <link rel="stylesheet" href="{% static 'testapp/css/logput.css' %}">
</head>
<body>
    <div class="logout-container">
        <h2>Are you sure you want to logout and delete your account?</h2>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Yes, Logout & Delete</button>
            <a href="{% url 'index' %}">
                <button type="button">Cancel</button>
            </a>
        </form>
    </div>
</body>
</html>
