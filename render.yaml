services:
  - type: web
    name: mitadt-mess-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py makemigrations --empty testapp && python manage.py makemigrations testapp && python manage.py migrate --run-syncdb"
    startCommand: "python manage.py collectstatic --noinput && gunicorn mitadt_mess.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: True
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        value: sqlite:///db.sqlite3
    autoDeploy: true
